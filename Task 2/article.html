<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Article Page</title>
  <style>
    :root{ /*used the root selector so I can change the values here once to affect the whole project, more practicale وكذا*/
      --main-color: #2c3e50; 
      --sub-color: #e74c3c;  
      --text-color: #16a085; 
      --bg: #f9f9f9;
      --card-bg: #ffffff;
      --accent: #3498db;
    }
    body{font-family: Arial, Helvetica, sans-serif;background:var(--bg);margin:0;padding:40px;}
    .container{max-width:800px;margin:0 auto;background:var(--card-bg);padding:30px;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,0.06);text-align:center}

    h1.main-topic{color:var(--main-color);margin:0 0 8px;font-size:2rem}
    h2.sub-topic{color:var(--sub-color);margin:0 0 16px;font-size:1.25rem}
    p.lead{color:var(--text-color);line-height:1.7;margin:0 0 20px}

    .hero-photo{max-width:100%;height:auto;border-radius:6px;margin:18px 0}

    form{margin-top:26px;text-align:left}
    .form-row{display:flex;gap:12px}
    .form-group{flex:1}
    label{display:block;font-weight:600;margin-bottom:6px;color:#333}
    input[type="text"],input[type="email"],textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:0.95rem}
    textarea{min-height:110px;resize:vertical}

    .actions{display:flex;justify-content:flex-end;margin-top:12px}
    button.submit-btn{background:var(--accent);color:#fff;padding:10px 18px;border:none;border-radius:6px;font-weight:700;cursor:pointer;transition:background 200ms ease, transform 120ms ease}
    button.submit-btn:hover{background:#00e3f3;transform:translateY(-2px)}

    .header-center{text-align:center}

    @media (max-width:600px){
      .form-row{flex-direction:column}
      .actions{justify-content:center}
    }
  </style>
</head>
<body>
  <main class="container">
    <header class="header-center">
      <h1 class="main-topic">The Future of Web Design</h1>
      <h2 class="sub-topic">Trends shaping interfaces in 2026</h2>
      <p class="lead">Modern web design balances performance, accessibility, and delightful interactions. Images and concise microcopy help convey ideas quickly while polished forms collect meaningful responses from readers.</p>
    </header>

    <figure>
      <img class="hero-photo" src="Task 2/photo.jpg" alt="Design illustration" />
    </figure>

    <section>
      <form action="#" method="post">
        <div class="form-row">
          <div class="form-group">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" placeholder="Your full name" required />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="Name@example.com" required />
          </div>
        </div>

        <div style="margin-top:12px">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Write your message here" required></textarea>
        </div>

        <div class="actions">
          <button class="submit-btn" type="submit">Send Message</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
