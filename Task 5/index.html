<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 5 - Login</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f3f4f6;
        font-family: Arial, Helvetica, sans-serif;
        transition: background 1s ease, color 1s ease;
        color: #111;
      }

      .login-box {
        width: min(90%, 420px);
        background: #fff;
        padding: 2rem;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        transition: background 1s ease, color 1s ease;
      }

      h2 {
        margin-top: 0;
        text-align: center;
      }

      .form-group {
        margin-bottom: 1rem;
      }

      label {
        display: block;
        margin-bottom: 0.4rem;
        font-weight: 600;
      }

      input {
        width: 100%;
        padding: 0.8rem;
        border: 1px solid #ccc;
        border-radius: 8px;
        box-sizing: border-box;
      }

      .error {
        color: #dc3545;
        font-size: 0.9rem;
        margin-top: 0.4rem;
        min-height: 1em;
      }

      button {
        width: 100%;
        padding: 0.85rem;
        border: none;
        border-radius: 8px;
        background: #0d6efd;
        color: #fff;
        cursor: pointer;
        font-size: 1rem;
      }

      button:hover {
        background: #0b5ed7;
      }

      .success {
        display: none;
        color: #198754;
        margin-top: 0.8rem;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      <h2>Login</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required />
          <div class="error" id="passwordError"></div>
        </div>

        <button type="submit">Login</button>
        <div class="success" id="successMsg">Login successful!</div>
      </form>
    </div>

    <script>
      const form = document.getElementById("loginForm");
      const passwordInput = document.getElementById("password");
      const errorBox = document.getElementById("passwordError");
      const successMsg = document.getElementById("successMsg");

      const passwordRegex = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[^A-Za-z0-9]).{11,}$/;

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        errorBox.textContent = "";
        successMsg.style.display = "none";

        const password = passwordInput.value;

        if (password.length <= 10) {
          errorBox.textContent = "Password must be more than 10 characters.";
          return;
        }

        if (!passwordRegex.test(password)) {
          errorBox.textContent = "Password must include letters, numbers, and symbols.";
          return;
        }

        successMsg.textContent = "Login successful!";
        successMsg.style.display = "block";
      });

      setTimeout(() => {
        document.body.style.backgroundColor = "black";
        document.body.style.color = "white";
        document.querySelector(".login-box").style.backgroundColor = "#1f1f1f";
        document.querySelector(".login-box").style.color = "white";
        document.querySelector(".login-box").style.boxShadow = "0 10px 30px rgba(255,255,255,0.15)";
      }, 10000);
    </script>
  </body>
</html>
